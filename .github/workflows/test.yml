name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Check version consistency
        run: npm run check:versions

      - name: Lint (0 errors gate)
        run: npm run lint

      - run: npm run build

      - run: npm test
        env:
          BM_LLM_TEST: "0"

      - name: Coverage (text summary only)
        run: npm run test:coverage
        env:
          BM_LLM_TEST: "0"
